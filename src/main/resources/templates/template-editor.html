<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Конструктор Шаблонов | SparklingDuo</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #F7F3F0; --ink: #2C2C2C; --border: #D1CEC7; --accent: #8B4513; }
        body { font-family: 'Inter', sans-serif; background: var(--paper); color: var(--ink); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Styles */
        .sidebar { width: 380px; border-right: 1px solid var(--border); padding: 30px; display: flex; flex-direction: column; background: white; box-shadow: 2px 0 10px rgba(0,0,0,0.05); z-index: 10; }
        h2 { font-family: 'EB Garamond', serif; margin-top: 0; font-size: 28px; }
        .back-link { text-decoration: none; color: #888; font-size: 12px; margin-bottom: 20px; display: inline-block; transition: 0.2s; }
        .back-link:hover { color: var(--ink); }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; color: #888; }
        input[type="text"], select { width: 100%; padding: 12px; border: 1px solid var(--border); background: var(--paper); font-family: 'Inter'; border-radius: 4px; }

        /* Entries List Styling */
        #entries-list { flex-grow: 1; overflow-y: auto; margin: 20px 0; padding-right: 5px; }
        .entry-card { background: var(--paper); padding: 12px; margin-bottom: 10px; border-radius: 4px; border-left: 4px solid var(--ink); position: relative; font-size: 13px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .entry-card b { display: block; margin-bottom: 4px; font-family: 'EB Garamond', serif; font-size: 16px; }
        .entry-card .meta { font-size: 10px; color: #888; margin-bottom: 8px; }
        .entry-card select { padding: 4px; font-size: 11px; width: auto; margin-right: 10px; }
        .btn-del { position: absolute; top: 10px; right: 10px; cursor: pointer; border: none; background: transparent; opacity: 0.5; }
        .btn-del:hover { opacity: 1; color: red; }

        /* Workspace */
        .main-workspace { flex-grow: 1; overflow: auto; display: flex; justify-content: center; align-items: flex-start; padding: 40px; background: #EEEAE6; position: relative; }
        #canvas-container { position: relative; box-shadow: 0 15px 50px rgba(0,0,0,0.2); background: white; line-height: 0; }
        canvas { position: absolute; top: 0; left: 0; }
        #preview-img { display: block; user-select: none; -webkit-user-drag: none; }

        .btn-save { background: var(--ink); color: var(--paper); border: none; padding: 18px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; font-size: 12px; transition: 0.3s; }
        .btn-save:hover { background: #444; letter-spacing: 3px; }

        .hint { font-size: 11px; color: #999; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="sidebar">
    <a href="/templates" class="back-link">← РЕЕСТР ШАБЛОНОВ</a>
    <h2>Конструктор</h2>

    <div class="input-group">
        <label>Название документа</label>
        <input type="text" id="templateName" placeholder="Введите название..." oninput="saveToLocal()">
    </div>

    <div class="input-group">
        <label>Эталонный образ</label>
        <input type="file" id="imageLoader" accept="image/*">
    </div>

    <div id="entries-list">
        <!-- Сюда будут падать карточки -->
    </div>

    <button class="btn-save" onclick="saveTemplate()">Зафиксировать в Базе</button>
    <p class="hint">Ctrl + Z — отменить последний бокс</p>
</div>

<div class="main-workspace">
    <div id="canvas-container">
        <img id="preview-img" src="">
        <canvas id="drawing-canvas"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('drawing-canvas');
    const ctx = canvas.getContext('2d');
    const imageLoader = document.getElementById('imageLoader');
    const img = document.getElementById('preview-img');
    const container = document.getElementById('canvas-container');

    let startX, startY, isDrawing = false;
    let entries = [];
    let scale = 1;

    // --- LOCAL STORAGE LOGIC ---
    function saveToLocal() {
        localStorage.setItem('draft_name', document.getElementById('templateName').value);
        localStorage.setItem('draft_entries', JSON.stringify(entries));
        if (img.src && img.src.startsWith('data:')) {
            localStorage.setItem('draft_img', img.src);
        }
    }

    window.onload = () => {
        const dName = localStorage.getItem('draft_name');
        const dEntries = localStorage.getItem('draft_entries');
        const dImg = localStorage.getItem('draft_img');

        if (dName) document.getElementById('templateName').value = dName;
        if (dEntries) {
            entries = JSON.parse(dEntries);
            renderEntries();
        }
        if (dImg) {
            loadImageToCanvas(dImg);
        }
    };

    // --- IMAGE LOADING ---
    imageLoader.addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            loadImageToCanvas(event.target.result);
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    function loadImageToCanvas(src) {
        img.onload = () => {
            canvas.width = img.clientWidth;
            canvas.height = img.clientHeight;
            scale = img.naturalWidth / img.clientWidth;
            drawAll();
            saveToLocal();
        };
        img.src = src;
    }

    // --- DRAWING LOGIC ---
    canvas.onmousedown = (e) => {
        if (!img.src) return;
        startX = e.offsetX;
        startY = e.offsetY;
        isDrawing = true;
    };

    canvas.onmousemove = (e) => {
        if (!isDrawing) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawAll();
        ctx.strokeStyle = '#8B4513';
        ctx.setLineDash([5, 5]);
        ctx.strokeRect(startX, startY, e.offsetX - startX, e.offsetY - startY);
    };

    canvas.onmouseup = (e) => {
        if (!isDrawing) return;
        isDrawing = false;
        ctx.setLineDash([]);

        const name = prompt("Название поля:");
        if (name) {
            entries.push({
                name: name,
                type: 'TEXT',
                padding: 5,
                box: {
                    x: Math.round(startX * scale),
                    y: Math.round(startY * scale),
                    width: Math.round((e.offsetX - startX) * scale),
                    height: Math.round((e.offsetY - startY) * scale),
                    pageNumber: 0
                }
            });
            renderEntries();
            saveToLocal();
        }
        drawAll();
    };

    // Ctrl + Z
    window.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'z' && entries.length > 0) {
            entries.pop();
            renderEntries();
            drawAll();
            saveToLocal();
        }
    });

    function drawAll() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        entries.forEach(entry => {
            const b = entry.box;
            ctx.strokeStyle = entry.type === 'SIGNATURE' ? '#4A5D4E' : '#2C2C2C';
            ctx.lineWidth = 2;
            ctx.strokeRect(b.x/scale, b.y/scale, b.width/scale, b.height/scale);

            ctx.fillStyle = ctx.strokeStyle;
            ctx.font = 'bold 10px Inter';
            ctx.fillText(entry.name.toUpperCase(), b.x/scale, (b.y/scale) - 5);
        });
    }

    function renderEntries() {
        const list = document.getElementById('entries-list');
        list.innerHTML = '';
        entries.forEach((entry, i) => {
            const card = document.createElement('div');
            card.className = 'entry-card';
            card.style.borderLeftColor = entry.type === 'SIGNATURE' ? '#4A5D4E' : '#8B4513';
            card.innerHTML = `
                <button class="btn-del" onclick="deleteEntry(${i})">✕</button>
                <b>${entry.name}</b>
                <div class="meta">X:${entry.box.x} Y:${entry.box.y} | W:${entry.box.width} H:${entry.box.height}</div>
                <select onchange="updateType(${i}, this.value)">
                    <option value="TEXT" ${entry.type==='TEXT'?'selected':''}>TEXT</option>
                    <option value="NUMERIC" ${entry.type==='NUMERIC'?'selected':''}>NUMERIC</option>
                    <option value="DATE" ${entry.type==='DATE'?'selected':''}>DATE</option>
                    <option value="SIGNATURE" ${entry.type==='SIGNATURE'?'selected':''}>SIGNATURE</option>
                </select>
                <input type="number" value="${entry.padding}" style="width:40px; font-size:10px"
                       onchange="entries[${i}].padding=parseInt(this.value); saveToLocal();" title="Padding">
            `;
            list.appendChild(card);
        });
    }

    function deleteEntry(i) {
        entries.splice(i, 1);
        renderEntries();
        drawAll();
        saveToLocal();
    }

    function updateType(i, val) {
        entries[i].type = val;
        drawAll();
        saveToLocal();
    }

    async function saveTemplate() {
        const name = document.getElementById('templateName').value;
        if (!name || entries.length === 0) return alert("Заполните название и нарисуйте хотя бы одно поле!");

        const payload = {
            name: name,
            baseWidth: img.naturalWidth,
            baseHeight: img.naturalHeight,
            entries: entries
        };

        const response = await fetch('/api/templates', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            alert("Шаблон успешно зафиксирован в реестре!");
            localStorage.clear();
            window.location.href = '/templates';
        }
    }
</script>
</body>
</html>

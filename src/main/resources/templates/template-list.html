<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru"
      th:replace="~{layout/page :: layout(
          pageTitle  = 'Реестр шаблонов',
          activeNav  = 'list',
          extraCss   = '/css/list.css',
          extraCss2  = null
      )}">

<th:block th:fragment="pageContent">
    <div class="page">

        <div class="hero">
            <div class="hero-titles">
                <div class="eyebrow">Архив документов</div>
                <h1>Реестр <em>шаблонов</em></h1>
                <div class="hero-meta">
                    <div><b id="statTotal">—</b>всего шаблонов</div>
                    <div><b id="statFields">—</b>размеченных полей</div>
                    <div><b id="statLast">—</b>последнее обновление</div>
                </div>
            </div>
            <a href="/templates/editor" class="btn btn-primary btn-lg">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                Новый шаблон
            </a>
        </div>

        <div class="toolbar">
            <div class="search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
                <input id="searchInput" type="text" placeholder="Поиск по названию или ID…" autocomplete="off">
            </div>
            <select class="select sort-select" id="sortSelect">
                <option value="recent">Сначала новые</option>
                <option value="name">По названию</option>
                <option value="fields">По числу полей</option>
            </select>
            <div class="view-toggle" role="tablist">
                <button id="viewGrid" class="active" title="Сетка">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                </button>
                <button id="viewTable" title="Таблица">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
                </button>
            </div>
        </div>

        <div id="content"></div>
    </div>

    <div class="modal-backdrop" id="confirmModal"
         th:replace="~{fragments/modal-confirm :: modalConfirm(
             modalId      = 'confirmModal',
             title        = 'Удалить шаблон?',
             bodyHtml     = 'Архивный файл «&lt;span id=&quot;confirmName&quot;&gt;&lt;/span&gt;» будет удалён из реестра безвозвратно. Связанные результаты распознавания сохранятся.',
             cancelLabel  = 'Отмена',
             confirmId    = 'confirmDelete',
             confirmLabel = 'Удалить'
         )}">
    </div>
</th:block>

<th:block th:fragment="pageScripts">
    <script type="module" th:src="@{/js/pages/list.js}"></script>
</th:block>

</html>

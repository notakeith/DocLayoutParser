name: doc-layout-parser

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: doclayout_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ocr:
    build: ../ocr-service
    ports:
      - "5000:5000"

    volumes:
      - paddle_data:/root/.paddleocr

  app:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - ocr

volumes:
  postgres_data:
  paddle_data:
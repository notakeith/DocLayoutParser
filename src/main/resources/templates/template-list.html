<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Архив Шаблонов | SparklingDuo</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #F7F3F0; --ink: #2C2C2C; --accent: #8B4513; --border: #D1CEC7; }
        body { font-family: 'Inter', sans-serif; background-color: var(--paper); color: var(--ink); margin: 0; padding: 50px; }
        h1, h2, h3 { font-family: 'EB Garamond', serif; font-weight: 600; }

        .container { max-width: 900px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid var(--border); margin-bottom: 40px; padding-bottom: 10px; }

        .btn { font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 1px; font-size: 11px; font-weight: 600;
            padding: 10px 20px; border: 1px solid var(--ink); background: transparent; cursor: pointer; transition: 0.3s; text-decoration: none; color: var(--ink); }
        .btn:hover { background: var(--ink); color: var(--paper); }
        .btn-delete { border-color: #a33; color: #a33; }
        .btn-delete:hover { background: #a33; color: white; }

        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th { text-align: left; font-family: 'EB Garamond', serif; font-size: 18px; padding: 15px; border-bottom: 2px solid var(--ink); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:hover { background: rgba(0,0,0,0.02); }

        .id-badge { font-family: monospace; font-size: 10px; color: #888; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Реестр Шаблонов</h1>
        <a href="/templates/editor" class="btn">+ Новый Шаблон</a>
    </div>

    <table>
        <thead>
        <tr>
            <th>Наименование документа</th>
            <th>Формат (px)</th>
            <th style="text-align: center">Действия</th>
        </tr>
        </thead>
        <tbody id="templates-table">
        <!-- Заполняется JS -->
        </tbody>
    </table>
</div>

<script>
    async function loadTemplates() {
        const response = await fetch('/api/templates');
        const templates = await response.json();
        const tbody = document.getElementById('templates-table');
        tbody.innerHTML = templates.map(t => `
            <tr>
                <td>
                    <div style="font-size: 16px; font-weight: 600;">${t.name}</div>
                    <div class="id-badge">${t.id}</div>
                </td>
                <td>${t.baseWidth} × ${t.baseHeight}</td>
                <td style="text-align: center;">
                    <a href="/templates/recognize/${t.id}" class="btn">Распознать</a>
                    <button onclick="deleteTemplate('${t.id}')" class="btn btn-delete" style="margin-left: 10px;">Удалить</button>
                </td>
            </tr>
        `).join('');
    }

    async function deleteTemplate(id) {
        if (confirm('Архивный файл будет удален безвозвратно. Продолжить?')) {
            await fetch(`/api/templates/${id}`, { method: 'DELETE' });
            loadTemplates();
        }
    }
    loadTemplates();
</script>
</body>
</html>

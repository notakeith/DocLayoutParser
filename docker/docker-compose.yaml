name: doc-layout-parser

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: doclayout_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console (http://localhost:9001)
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Создаём бакеты и lifecycle policy при старте
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app-network
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin};
        mc mb --ignore-existing local/uploads;
        mc mb --ignore-existing local/reference-images;
        mc ilm rule add --expire-days 7 local/uploads;
        echo 'MinIO buckets ready';
      "

  app:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_started
      minio:
        condition: service_healthy
    environment:
      - OCR_SERVICE_URL=http://surya-ocr:5000
      - LLM_SERVICE_URL=http://llm-service:5001
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/doclayout_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - APP_STORAGE_ENDPOINT=http://minio:9000
      - APP_STORAGE_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - APP_STORAGE_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - APP_STORAGE_UPLOADS_BUCKET=uploads
      - APP_STORAGE_REFERENCE_BUCKET=reference-images
    networks:
      - app-network
    restart: unless-stopped
    env_file:
      - ../.env

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
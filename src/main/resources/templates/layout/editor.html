<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru"
      th:fragment="layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | SparklingDuo'">Конструктор | SparklingDuo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/_shared.css}">
    <link rel="stylesheet" th:href="@{/css/editor.css}">
</head>
<body>

<th:block th:replace="~{::editorTopbar}"></th:block>
<th:block th:replace="~{::editorContent}"></th:block>
<th:block th:replace="~{::editorModals}"></th:block>

<th:block th:replace="~{fragments/toasts :: toasts}"></th:block>

<th:block th:replace="~{::pageScripts}"></th:block>

</body>
</html>

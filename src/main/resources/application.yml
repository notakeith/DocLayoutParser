server:
  port: 8080

spring:
  application:
    name: doc-layout-parser

  datasource:
    url: jdbc:postgresql://localhost:5432/doclayout_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

app:
  ocr:
    tessdata-path: "src/main/resources/tessdata"
    language: "rus"
    pageSegMode: 7
  image:
    target-width: 2000
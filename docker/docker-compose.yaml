name: doc-layout-parser

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: doclayout_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  surya-ocr:
    build:
      context: ./ocr/surya-service
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - LLM_URL=http://llm-service:5001
      - LLM_ENABLED=1
    volumes:
      - surya_cache:/root/.cache
      - paddle_data:/root/.paddleocr
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  llm-service:
    build:
      context: ./ocr/llm-service
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - LLM_MODEL=mlx-community/Qwen2.5-7B-Instruct-4bit
    volumes:
      - llm_cache:/root/.cache
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  app:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      surya-ocr:
        condition: service_healthy
      llm-service:
        condition: service_healthy
      db:
        condition: service_started
    environment:
      - OCR_SERVICE_URL=http://surya-ocr:5000
      - LLM_SERVICE_URL=http://llm-service:5001
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/doclayout_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  paddle_data:
  surya_cache:
  llm_cache:
server:
  port: 8080

spring:
  application:
    name: doc-layout-parser

  datasource:
    url: jdbc:postgresql://localhost:5432/doclayout_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  task:
    execution:
      pool:
        core-size: 2
        max-size: 4
        queue-capacity: 50
      thread-name-prefix: recognition-

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  ocr:
    provider: ${OCR_PROVIDER:YANDEX}
    tessdata-path: "src/main/resources/tessdata"
    language: "rus"
    pageSegMode: 6
    paddle-url: ${SURYA_SERVICE_URL:http://localhost:5000/recognize}
    yandex:
      iam-token: ${YANDEX_OCR_IAM_TOKEN:}
      api-key: ${YANDEX_OCR_API_KEY:}
      folder-id: ${YANDEX_FOLDER_ID:}

  llm:
    enabled: ${USE_LLM_POST_PROCESSING:false}
    api-key: ${YANDEX_LLM_API_KEY:}
    model-id: ${YANDEX_LLM_PROMPT_ID:}

  image:
    target-width: 2000

  storage:
    endpoint: ${APP_STORAGE_ENDPOINT:http://localhost:9000}
    access-key: ${APP_STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${APP_STORAGE_SECRET_KEY:minioadmin}
    uploads-bucket: ${APP_STORAGE_UPLOADS_BUCKET:uploads}
    reference-bucket: ${APP_STORAGE_REFERENCE_BUCKET:reference-images}
    region: us-east-1